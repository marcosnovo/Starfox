<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sky gradient</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--silhouette-void); }
  .strip { height: 200px; border-radius: 4px; border: 1px solid var(--surface-hairline); background: var(--gradient-sky-dusk); position: relative; }
  .stops { display: flex; justify-content: space-between; margin-top: 10px; font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); }
  .stops span:nth-child(1){ color: var(--ink-bone); }
  .stops span:nth-child(5){ color: var(--ink-bone); }
</style>
</head>
<body>
  <div class="strip"></div>
  <div class="stops"><span>0%  deep</span><span>30%  plum</span><span>55%  ember</span><span>80%  flare</span><span>100%  haze</span></div>
</body>
</html>
