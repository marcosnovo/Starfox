<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Display type — Inter Tight</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--silhouette-void); color: var(--ink-bone); }
  .row { display: flex; align-items: baseline; gap: 32px; padding: 14px 0; border-top: 1px solid var(--surface-divider); }
  .row:first-of-type { border-top: 0; }
  .meta { font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); width: 170px; flex: none; }
  .specimen { color: var(--ink-bone); }
</style>
</head>
<body>
  <div class="row"><div class="meta">display / 88 / 200</div><div class="specimen" style="font:200 76px/0.95 'Inter Tight'; letter-spacing:-0.04em">Horizon</div></div>
  <div class="row"><div class="meta">title / 42 / 300</div><div class="specimen" style="font:300 38px 'Inter Tight'; letter-spacing:-0.02em">Caldera, cleared.</div></div>
  <div class="row"><div class="meta">heading / 22 / 400</div><div class="specimen" style="font:400 22px 'Inter Tight'">Threshold reached. Climb.</div></div>
  <div class="row"><div class="meta">body / 15 / 400</div><div class="specimen" style="font:400 15px/1.5 'Inter Tight'; color: var(--ink-dim)">Tilt to bank. Tap to fire. Hold to brake.</div></div>
  <div class="row"><div class="meta">italic-tag / 22 / 300i</div><div class="specimen" style="font:300 italic 22px 'Inter Tight'; color: var(--ink-haze)">Chase the light.</div></div>
</body>
</html>
