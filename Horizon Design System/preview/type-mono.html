<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HUD type — JetBrains Mono</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--silhouette-void); color: var(--ink-bone); }
  .row { display: flex; align-items: baseline; gap: 32px; padding: 14px 0; border-top: 1px solid var(--surface-divider); }
  .row:first-of-type { border-top: 0; }
  .meta { font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); width: 170px; flex: none; }
</style>
</head>
<body>
  <div class="row"><div class="meta">readout-xl / 64 / 300</div><div style="font:300 56px/1 'JetBrains Mono'; letter-spacing:-0.02em">2,450</div></div>
  <div class="row"><div class="meta">readout / 32 / 400</div><div style="font:400 32px 'JetBrains Mono'; color: var(--accent-ember)">×2.0</div></div>
  <div class="row"><div class="meta">label / 11 / 500</div><div style="font:500 11px 'JetBrains Mono'; letter-spacing:0.22em; text-transform:uppercase; color: var(--ink-dim)">Score · Wave · Multiplier</div></div>
  <div class="row"><div class="meta">eyebrow / 10 / 500</div><div style="font:500 10px 'JetBrains Mono'; letter-spacing:0.32em; text-transform:uppercase; color: var(--ink-haze)">An arcade flight game · 2026</div></div>
  <div class="row"><div class="meta">telemetry / 13 / 400</div><div style="font:400 13px 'JetBrains Mono'; letter-spacing:0.18em">ALT 12,840 ft · SPD 0.82 M · HDG 287°</div></div>
</body>
</html>
