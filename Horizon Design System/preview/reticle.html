<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reticle</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: url('../assets/starfox-bg.png') center/cover; min-height: 200px; }
  .row { display: flex; gap: 64px; justify-content: center; align-items: center; padding-top: 10px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .label { font: 500 10px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,245,232,0.65); text-shadow: 0 1px 8px rgba(0,0,0,0.5); }
  svg { filter: drop-shadow(0 1px 6px rgba(0,0,0,0.55)); }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <svg width="92" height="52" viewBox="0 0 100 55">
        <path d="M 22 8 L 12 8 L 12 47 L 22 47" fill="none" stroke="#fff5e8" stroke-width="1.5" stroke-linecap="square"/>
        <path d="M 78 8 L 88 8 L 88 47 L 78 47" fill="none" stroke="#fff5e8" stroke-width="1.5" stroke-linecap="square"/>
        <line x1="46" y1="27.5" x2="42" y2="27.5" stroke="#fff5e8" stroke-width="1.4"/>
        <line x1="54" y1="27.5" x2="58" y2="27.5" stroke="#fff5e8" stroke-width="1.4"/>
        <line x1="50" y1="23.5" x2="50" y2="20" stroke="#fff5e8" stroke-width="1.4"/>
        <line x1="50" y1="31.5" x2="50" y2="35" stroke="#fff5e8" stroke-width="1.4"/>
      </svg>
      <div class="label">Default</div>
    </div>
    <div class="item">
      <svg width="92" height="52" viewBox="0 0 100 55">
        <path d="M 22 8 L 12 8 L 12 47 L 22 47" fill="none" stroke="#ff6a1a" stroke-width="1.8" stroke-linecap="square"/>
        <path d="M 78 8 L 88 8 L 88 47 L 78 47" fill="none" stroke="#ff6a1a" stroke-width="1.8" stroke-linecap="square"/>
        <line x1="46" y1="27.5" x2="42" y2="27.5" stroke="#ff6a1a" stroke-width="1.6"/>
        <line x1="54" y1="27.5" x2="58" y2="27.5" stroke="#ff6a1a" stroke-width="1.6"/>
        <line x1="50" y1="23.5" x2="50" y2="20" stroke="#ff6a1a" stroke-width="1.6"/>
        <line x1="50" y1="31.5" x2="50" y2="35" stroke="#ff6a1a" stroke-width="1.6"/>
      </svg>
      <div class="label">Locked — flare</div>
    </div>
  </div>
</body>
</html>
