<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stroke weights</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--silhouette-void); color: var(--ink-bone); }
  .row { display: flex; gap: 28px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .line { width: 80px; background: var(--ink-bone); }
  .num { font: 500 10px 'JetBrains Mono'; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .role { font: 400 11px/1.3 'Inter Tight'; color: var(--ink-dim); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="line" style="height:1px"></div><div class="num">1 · hairline</div><div class="role">Borders · dividers</div></div>
    <div class="item"><div class="line" style="height:1.5px"></div><div class="num">1.5 · thin</div><div class="role">Icons · reticle</div></div>
    <div class="item"><div class="line" style="height:2px"></div><div class="num">2 · medium</div><div class="role">Active states</div></div>
    <div class="item"><div class="line" style="height:3px"></div><div class="num">3 · bold</div><div class="role">Rare emphasis</div></div>
  </div>
</body>
</html>
