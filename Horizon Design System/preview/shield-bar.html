<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Shield bar — states</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: url('../assets/starfox-bg.png') center/cover; min-height: 240px; color: #fff5e8; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .label { font: 500 11px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,245,232,0.65); text-shadow: 0 1px 8px rgba(0,0,0,0.5); margin-bottom: 6px; }
  .bar { width: 220px; height: 12px; border: 1.5px solid rgba(255,245,232,0.85); border-radius: 1px; padding: 2px; box-sizing: border-box; }
  .fill { height: 100%; }
  .row { display: flex; align-items: center; gap: 14px; }
  .tag { font: 500 10px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,245,232,0.65); text-shadow: 0 1px 8px rgba(0,0,0,0.5); }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="label">Shield · healthy</div>
      <div class="row"><div class="bar"><div class="fill" style="width:78%; background:#fff5e8"></div></div><div class="tag">0.78</div></div>
    </div>
    <div>
      <div class="label">Shield · critical (&lt; 0.30)</div>
      <div class="row"><div class="bar"><div class="fill" style="width:22%; background:#ff5566"></div></div><div class="tag">0.22</div></div>
    </div>
    <div>
      <div class="label">Shield · charged (FX)</div>
      <div class="row"><div class="bar"><div class="fill" style="width:100%; background:#7adfd0"></div></div><div class="tag">+1.00</div></div>
    </div>
  </div>
</body>
</html>
