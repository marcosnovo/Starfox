<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reference background</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px; background: var(--silhouette-void); color: #fff5e8; }
  .frame { position: relative; aspect-ratio: 16 / 9; max-height: 320px; border-radius: 4px; overflow: hidden; background: url('../assets/starfox-bg.png') center/cover; border: 1px solid var(--surface-hairline); }
  .stamp { position: absolute; left: 14px; bottom: 12px; font: 500 10px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,245,232,0.85); text-shadow: 0 1px 8px rgba(0,0,0,0.5); }
  .stamp .dim { color: rgba(255,245,232,0.55); }
</style>
</head>
<body>
  <div class="frame">
    <div class="stamp">starfox-bg.png  ·  <span class="dim">canonical · use as background-image</span></div>
  </div>
</body>
</html>
