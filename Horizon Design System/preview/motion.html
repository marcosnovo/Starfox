<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Motion</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--silhouette-void); color: var(--ink-bone); }
  .row { display: grid; grid-template-columns: 90px 1fr 80px; gap: 18px; align-items: center; padding: 12px 0; border-top: 1px solid var(--surface-divider); }
  .row:first-of-type { border-top: 0; }
  .num { font: 500 11px 'JetBrains Mono'; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-bone); }
  .label { font: 500 10px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); }
  .track { position: relative; height: 4px; background: rgba(255,245,232,0.08); border-radius: 2px; overflow: hidden; }
  .dot { position: absolute; top: -3px; width: 10px; height: 10px; background: var(--accent-ember); border-radius: 50%; animation: slide var(--d) cubic-bezier(0.2, 0.7, 0.2, 1) infinite alternate; }
  @keyframes slide { from { left: 0; } to { left: calc(100% - 10px); } }
</style>
</head>
<body>
  <div class="row"><div class="num">80 ms</div><div class="track"><div class="dot" style="--d:80ms"></div></div><div class="label">instant</div></div>
  <div class="row"><div class="num">160 ms</div><div class="track"><div class="dot" style="--d:160ms"></div></div><div class="label">fast</div></div>
  <div class="row"><div class="num">220 ms</div><div class="track"><div class="dot" style="--d:220ms"></div></div><div class="label">base</div></div>
  <div class="row"><div class="num">480 ms</div><div class="track"><div class="dot" style="--d:480ms"></div></div><div class="label">slow</div></div>
  <div class="row" style="padding-top: 18px;"><div class="label" style="grid-column: 1 / -1">Ease — cubic-bezier(0.2, 0.7, 0.2, 1)</div></div>
</body>
</html>
