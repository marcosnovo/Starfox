<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Type pairing</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--silhouette-void); color: var(--ink-bone); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .col h3 { font: 500 10px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); margin: 0 0 14px; }
  .display { font:200 64px/0.95 'Inter Tight'; letter-spacing:-0.04em; }
  .body    { font:400 14px/1.5 'Inter Tight'; color: var(--ink-dim); margin-top: 6px; }
  .readout { font:300 56px/1 'JetBrains Mono'; letter-spacing:-0.02em; }
  .label   { font:500 11px 'JetBrains Mono'; letter-spacing:0.22em; text-transform:uppercase; color: var(--ink-dim); margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col">
      <h3>Display — Inter Tight</h3>
      <div class="display">Horizon</div>
      <div class="body">Narrative, menus, screen titles. Light weights at large sizes; never used for numerics.</div>
    </div>
    <div class="col">
      <h3>HUD — JetBrains Mono</h3>
      <div class="label">Score</div>
      <div class="readout">2,450</div>
      <div class="body">Numerics, telemetry, labels. Tracked-out for labels; tight for big numerics.</div>
    </div>
  </div>
</body>
</html>
