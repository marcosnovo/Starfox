<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Buttons</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: url('../assets/starfox-bg.png') center/cover; }
  .scrim { position: fixed; inset: 0; background: rgba(10,6,18,0.45); backdrop-filter: blur(2px); z-index: 0; }
  .row { position: relative; z-index: 1; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; padding: 12px 0; }
  .label { font: 500 10px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim); width: 110px; }
  .btn { font: 500 12px 'JetBrains Mono'; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: transform 160ms cubic-bezier(0.2, 0.7, 0.2, 1), border-color 160ms; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: #fff5e8; color: #0a0612; border: none; padding: 16px 32px; }
  .btn-ghost { background: transparent; color: #fff5e8; border: 1px solid rgba(255,245,232,0.4); padding: 14px 28px; display: inline-flex; gap: 10px; align-items: center; }
  .btn-ghost:hover { border-color: rgba(255,245,232,0.85); }
  .btn-ghost.disabled { color: rgba(255,245,232,0.35); border-color: rgba(255,245,232,0.18); pointer-events: none; }
</style>
</head>
<body>
  <div class="scrim"></div>
  <div class="row"><div class="label">Primary</div><button class="btn btn-primary">Begin</button><button class="btn btn-primary">Launch</button></div>
  <div class="row"><div class="label">Ghost</div><button class="btn btn-ghost">Resume</button><button class="btn btn-ghost">Records</button><button class="btn btn-ghost">Settings</button></div>
  <div class="row"><div class="label">Disabled</div><button class="btn btn-ghost disabled">Locked</button></div>
</body>
</html>
