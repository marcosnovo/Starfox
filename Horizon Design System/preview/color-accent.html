<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Accent / signal</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--silhouette-void); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 70px; border-radius: 4px; border: 1px solid var(--surface-hairline); }
  .meta { display: flex; justify-content: space-between; font: 500 10px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase; }
  .name { color: var(--ink-bone); }
  .hex  { color: var(--ink-dim); letter-spacing: 0.05em; }
  .role { font: 400 11px/1.3 var(--font-display); color: var(--ink-dim); }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#ffb347"></div><div class="meta"><span class="name">ember</span><span class="hex">ffb347</span></div><div class="role">multiplier ≥ 2 · record</div></div>
    <div class="swatch"><div class="chip" style="background:#ff6a1a"></div><div class="meta"><span class="name">flare</span><span class="hex">ff6a1a</span></div><div class="role">lock-on · engine</div></div>
    <div class="swatch"><div class="chip" style="background:#fff5d0"></div><div class="meta"><span class="name">core</span><span class="hex">fff5d0</span></div><div class="role">sun disc · hotspot</div></div>
    <div class="swatch"><div class="chip" style="background:#7adfd0"></div><div class="meta"><span class="name">cyan</span><span class="hex">7adfd0</span></div><div class="role">shield charge FX</div></div>
    <div class="swatch"><div class="chip" style="background:#ff5566"></div><div class="meta"><span class="name">warn</span><span class="hex">ff5566</span></div><div class="role">low shield · error</div></div>
  </div>
</body>
</html>
