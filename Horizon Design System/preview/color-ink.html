<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ink palette</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--silhouette-void); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 84px; border-radius: 4px; border: 1px solid var(--surface-hairline); }
  .meta { display: flex; justify-content: space-between; font: 500 10px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase; }
  .name { color: var(--ink-bone); }
  .hex  { color: var(--ink-dim); letter-spacing: 0.05em; }
  /* checker pattern for transparent ink */
  .alpha { background-image: linear-gradient(45deg,#1a0e1c 25%,transparent 25%),linear-gradient(-45deg,#1a0e1c 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a0e1c 75%),linear-gradient(-45deg,transparent 75%,#1a0e1c 75%);background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#fff5e8"></div><div class="meta"><span class="name">bone</span><span class="hex">fff5e8</span></div></div>
    <div class="swatch"><div class="chip" style="background:#f5d8a8"></div><div class="meta"><span class="name">haze</span><span class="hex">f5d8a8</span></div></div>
    <div class="swatch"><div class="chip alpha" style="background-color:rgba(255,245,232,0.65)"></div><div class="meta"><span class="name">dim</span><span class="hex">0.65 α</span></div></div>
    <div class="swatch"><div class="chip alpha" style="background-color:rgba(255,245,232,0.35)"></div><div class="meta"><span class="name">ghost</span><span class="hex">0.35 α</span></div></div>
  </div>
</body>
</html>
